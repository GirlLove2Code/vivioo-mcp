<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivioo MCP — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0e10; color: #e8e6e1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 2rem; }
    h1 { color: #9A7B4F; margin-bottom: 0.5rem; }
    h2 { color: #8a8578; font-size: 1rem; margin-bottom: 2rem; }
    h3 { color: #9A7B4F; margin: 2rem 0 1rem; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 0.5rem; }

    #login { max-width: 400px; margin: 4rem auto; text-align: center; }
    #login input { background: #121215; border: 1px solid rgba(255,255,255,0.06); color: #e8e6e1; padding: 0.75rem 1rem; width: 100%; border-radius: 6px; margin: 1rem 0; font-size: 1rem; }
    #login input:focus { outline: none; border-color: rgba(154,123,79,0.5); }
    #login button { background: #9A7B4F; color: white; border: none; padding: 0.75rem 2rem; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    #login button:hover { background: #b8935f; }

    #dashboard { display: none; }
    .stats { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .stat { background: #17171b; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 1.5rem; flex: 1; text-align: center; }
    .stat .number { font-size: 2rem; color: #9A7B4F; font-weight: bold; }
    .stat .label { color: #8a8578; font-size: 0.85rem; margin-top: 0.25rem; }

    .card { background: #1e1e24; border: 1px solid rgba(255,255,255,0.06); border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .card .title { font-weight: bold; margin-bottom: 0.5rem; }
    .card .meta { color: #8a8578; font-size: 0.85rem; margin-bottom: 0.75rem; }
    .card .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .btn { padding: 0.5rem 1rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.85rem; }
    .btn-approve { background: rgba(74,140,111,0.12); color: #4A8C6F; border: 1px solid rgba(74,140,111,0.3); }
    .btn-reject { background: rgba(196,92,74,0.12); color: #C45C4A; border: 1px solid rgba(196,92,74,0.3); }
    .btn-approve:hover { background: rgba(74,140,111,0.25); }
    .btn-reject:hover { background: rgba(196,92,74,0.25); }

    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 3px; font-size: 0.75rem; font-weight: bold; }
    .badge-pending { background: rgba(154,123,79,0.15); color: #9A7B4F; }
    .badge-open { background: rgba(196,92,74,0.12); color: #C45C4A; }
    .badge-approved { background: rgba(74,140,111,0.12); color: #4A8C6F; }

    .empty { color: #5a5750; text-align: center; padding: 3rem; }
    .error { color: #C45C4A; margin: 1rem 0; }
    .loading { color: #8a8578; }
  </style>
</head>
<body>
  <div id="login">
    <h1>Vivioo MCP</h1>
    <h2>Admin Panel</h2>
    <input type="password" id="password" placeholder="Enter admin password" />
    <br>
    <button onclick="login()">Sign In</button>
    <p id="login-error" class="error" style="display:none"></p>
  </div>

  <div id="dashboard">
    <h1>Vivioo MCP — Admin</h1>
    <h2>Registry Management</h2>

    <div class="stats">
      <div class="stat">
        <div class="number" id="stat-agents">0</div>
        <div class="label">Registered Agents</div>
      </div>
      <div class="stat">
        <div class="number" id="stat-submissions">0</div>
        <div class="label">Pending Submissions</div>
      </div>
      <div class="stat">
        <div class="number" id="stat-concerns">0</div>
        <div class="label">Open Concerns</div>
      </div>
    </div>

    <h3>Pending Submissions</h3>
    <div id="submissions-list"><p class="loading">Loading...</p></div>

    <h3>Reported Concerns</h3>
    <div id="concerns-list"><p class="loading">Loading...</p></div>
  </div>

  <script>
    let adminPassword = '';

    function login() {
      adminPassword = document.getElementById('password').value;
      if (!adminPassword) return;

      // Test auth by fetching submissions
      fetch('/api/admin/submissions', {
        headers: { 'Authorization': 'Bearer ' + adminPassword }
      })
      .then(r => {
        if (r.status === 401) throw new Error('Wrong password');
        return r.json();
      })
      .then(() => {
        document.getElementById('login').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadDashboard();
      })
      .catch(err => {
        const el = document.getElementById('login-error');
        el.textContent = err.message;
        el.style.display = 'block';
      });
    }

    // Allow enter key
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    async function loadDashboard() {
      try {
        const [subRes, conRes] = await Promise.all([
          fetch('/api/admin/submissions', { headers: { 'Authorization': 'Bearer ' + adminPassword } }),
          fetch('/api/admin/concerns', { headers: { 'Authorization': 'Bearer ' + adminPassword } }),
        ]);

        const submissions = await subRes.json();
        const concerns = await conRes.json();

        document.getElementById('stat-submissions').textContent = submissions.items?.length || 0;
        document.getElementById('stat-concerns').textContent = concerns.items?.length || 0;

        renderSubmissions(submissions.items || []);
        renderConcerns(concerns.items || []);
      } catch (err) {
        console.error('Dashboard load error:', err);
      }
    }

    function renderSubmissions(items) {
      const el = document.getElementById('submissions-list');
      if (items.length === 0) {
        el.innerHTML = '<p class="empty">No pending submissions yet.</p>';
        return;
      }
      el.innerHTML = items.map(s => `
        <div class="card">
          <div class="title">${esc(s.agent_name)} <span class="badge badge-${s.status}">${s.status}</span></div>
          <div class="meta">
            Builder: ${esc(s.builder_name)} · Platform: ${esc(s.platform)} · ${esc(s.submitted_at?.split('T')[0] || '')}
          </div>
          <div>Profile: <a href="${esc(s.trust_profile_url)}" target="_blank" style="color:#5B8FB9">${esc(s.trust_profile_url)}</a></div>
          <div>Contact: ${esc(s.contact)}</div>
          ${s.status === 'pending' ? `
          <div class="actions">
            <button class="btn btn-approve" onclick="reviewSubmission('${esc(s.submission_id)}', 'approved')">Approve</button>
            <button class="btn btn-reject" onclick="reviewSubmission('${esc(s.submission_id)}', 'rejected')">Reject</button>
          </div>` : ''}
        </div>
      `).join('');
    }

    function renderConcerns(items) {
      const el = document.getElementById('concerns-list');
      if (items.length === 0) {
        el.innerHTML = '<p class="empty">No reported concerns.</p>';
        return;
      }
      el.innerHTML = items.map(c => `
        <div class="card">
          <div class="title">Concern: ${esc(c.agent_id)} <span class="badge badge-${c.status}">${c.status}</span></div>
          <div class="meta">
            Type: ${esc(c.concern_type)} · ${esc(c.submitted_at?.split('T')[0] || '')}
          </div>
          <div>${esc(c.description)}</div>
          ${c.reporter_contact ? `<div class="meta">Reporter: ${esc(c.reporter_contact)}</div>` : ''}
        </div>
      `).join('');
    }

    async function reviewSubmission(id, action) {
      try {
        await fetch('/api/admin/review', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + adminPassword, 'Content-Type': 'application/json' },
          body: JSON.stringify({ submission_id: id, action }),
        });
        loadDashboard();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function esc(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
